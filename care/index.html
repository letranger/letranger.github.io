<meta name="viewport" content="width=device-width, initial-scale=1">
<title>媽子長照機構預選方案</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
  :root{--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f8fafc;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
       color:var(--ink);background:var(--bg);line-height:1.6;}
  header{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;padding:22px 20px;}
  header h1{margin:0 0 4px;font-size:20px;}
  header p{margin:0;font-size:14px;opacity:.92;}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px;}
  #map{height:62vh;min-height:420px;width:100%;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.10);z-index:0;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 6px;}
  .chip{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
        border-radius:999px;padding:5px 12px;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;}
  .pin{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
       border-radius:50%;color:#fff;font-weight:700;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  h2{font-size:17px;margin:26px 0 12px;border-left:4px solid #0d9488;padding-left:10px;}
  .tablecard{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);overflow:hidden;}
  table{border-collapse:collapse;width:100%;font-size:13.5px;}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;}
  thead th{background:#0f766e;color:#fff;font-weight:600;white-space:nowrap;position:sticky;top:0;}
  tbody tr:nth-child(even){background:#f9fafb;}
  .name{font-weight:600;}
  .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;
       color:#fff;font-size:12px;font-weight:700;margin-right:6px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:6px;font-size:12px;font-weight:600;}
  .ok{background:#dcfce7;color:#166534;}
  .bad{background:#fee2e2;color:#b91c1c;}
  .dist{font-weight:700;color:#0f766e;white-space:nowrap;}
  .scroll{overflow-x:auto;}
  .note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;
        padding:12px 14px;margin-top:16px;font-size:13.5px;}
  a.gm{color:#0d9488;text-decoration:none;font-size:12.5px;white-space:nowrap;}
  a.gm:hover{text-decoration:underline;}
  .small{color:var(--muted);font-size:12px;}
  .leaflet-tooltip.lbl{background:rgba(255,255,255,.92);border:1px solid #cbd5e1;font-weight:700;
        font-size:12px;border-radius:6px;padding:2px 7px;color:#0f172a;box-shadow:0 1px 3px rgba(0,0,0,.2);}
</style>
</head>

<header>
  <h1>媽子長照機構預選方案</h1>
  <p>中心點（家）：高雄市鳳山區武慶二路（住家）　｜　行車距離與時間由 OSRM 道路路網計算，括號內為實地手寫車程</p>
</header>
<div class="wrap">
  <div id="map"></div>
  <div class="legend" id="legend">
    <span class="chip"><span class="dot" style="background:#111827"></span>家（中心點）</span>
  </div>

  <h2>機構比較表</h2>
  <div class="tablecard"><div class="scroll">
  <table>
    <thead><tr>
      <th>機構</th><th>服務類型</th><th>地址</th><th>電話</th><th>負責人</th>
      <th>核定收托</th><th>設立日期</th><th>評鑑</th><th>行車距離</th><th>導航</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  </div></div>

  <p class="small" style="margin-top:16px;">資料來源：高雄市社區式（日間照顧、小規模多機能）服務類長期照顧服務機構一覽表（統計至115/06/05）。座標為路段近似值，距離供參考。</p>
</div>

const home = DATA.home, inst = DATA.inst;

const map = L.map('map',{scrollWheelZoom:true});
// 國土測繪中心 電子地圖（全中文台灣圖資）
const nlsc = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}',
  {maxZoom:19, attribution:'圖資：內政部國土測繪中心'}).addTo(map);
// 備援底圖：OpenStreetMap
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, attribution:'© OpenStreetMap'});
L.control.layers({'電子地圖（中文）':nlsc,'OpenStreetMap':osm},null,{position:'topright',collapsed:false}).addTo(map);

// home marker
const homeIcon = L.divIcon({className:'',html:'<div style="background:#111827;color:#fff;border:2px solid #fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.4)">🏠</div>',iconSize:[30,30],iconAnchor:[15,15]});
L.marker([home.lat,home.lon],{icon:homeIcon}).addTo(map)
 .bindPopup('<b>家</b><br>'+home.addr);

const bounds = [[home.lat,home.lon]];
const legend = document.getElementById('legend');
const tbody = document.getElementById('tbody');

inst.forEach((it,idx)=>{
  // route polyline (geom is [lon,lat])
  const latlngs = it.geom.map(c=>[c[1],c[0]]);
  L.polyline(latlngs,{color:it.color,weight:5,opacity:.75}).addTo(map);

  // midpoint distance label
  const mid = latlngs[Math.floor(latlngs.length/2)];
  L.marker(mid,{opacity:0})
   .bindTooltip(it.dist+' 公里 ‧ '+it.dur+' 分鐘',{permanent:true,direction:'top',className:'lbl'}).addTo(map);

  // institution marker (numbered)
  const ic = L.divIcon({className:'',html:'<div class="pin" style="background:'+it.color+'">'+(idx+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
  L.marker([it.lat,it.lon],{icon:ic}).addTo(map)
   .bindPopup('<b>'+it.name+'</b><br>'+it.addr+'<br>電話：'+it.tel+'<br>行車：'+it.dist+' 公里 ‧ 約 '+it.dur+' 分鐘（手寫 '+it.min+'）');

  const gm = 'https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(home.addr)+'&destination='+encodeURIComponent('高雄市'+it.addr);
  tbody.insertAdjacentHTML('beforeend',

   '<td>'+it.tel+'</td>'+
   '<td>'+it.boss+'</td>'+
   '<td>'+it.cap+'</td>'+
   '<td>'+it.est+'</td>'+

   '<td class="dist">'+it.dist+' 公里<br>約 '+it.dur+' 分鐘<br><span class="small">手寫 '+it.min+'</span></td>'+
   '<td><a class="gm" href="'+gm+'" target="_blank">Google 導航 ↗</a></td>'+
   '</tr>');
});

map.fitBounds(bounds,{padding:[40,40]});
</script>
</body>
</html>
